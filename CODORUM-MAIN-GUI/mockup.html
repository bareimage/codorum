<!DOCTYPE html>
<html lang="en" data-theme="n01z">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codorum - Static Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Apple Dark Mode */
            --bg: #000000;
            --bg2: rgba(30, 30, 35, 0.65);
            --card: rgba(45, 45, 50, 0.65);
            --hover: rgba(255, 255, 255, 0.1);
            --tx: #ffffff;
            --tx2: rgba(255, 255, 255, 0.6);
            --tx3: rgba(255, 255, 255, 0.4);
            --ac: #0A84FF;
            --ac2: #5E5CE6;
            --ac3: #30D158;
            --warn: #FF9F0A;
            --danger: #FF453A;
            --brd: rgba(255, 255, 255, 0.1);
            --ring: rgba(10, 132, 255, 0.3);
            --input-bg: rgba(0, 0, 0, 0.2);
            --bg-gradient: radial-gradient(circle at 20% 0%, rgba(94, 92, 230, 0.5) 0%, transparent 50%), radial-gradient(circle at 80% 100%, rgba(10, 132, 255, 0.5) 0%, transparent 50%), radial-gradient(circle at 50% 50%, rgba(255, 69, 58, 0.3) 0%, transparent 50%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", sans-serif;
            background-color: var(--bg);
            color: var(--tx);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Custom Scrollbar for Mockup */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--tx3); }
    </style>
</head>
<body class="flex flex-col h-screen p-4 gap-4 transition-colors duration-200 relative overflow-hidden">
    
    <!-- Backgrounds -->
    <div class="absolute inset-0 z-0 bg-[var(--bg)]"></div>
    <div class="absolute inset-0 z-0 opacity-100 blur-[80px] saturate-150 animate-[gradientBG_15s_ease_infinite]" style="background-image: var(--bg-gradient); background-size: 200% 200%;"></div>

    <!-- UI Layer -->
    <div class="relative z-10 flex flex-col h-full gap-4 w-full">
        
        <!-- Toolbar -->
        <div class="flex justify-center w-full z-50">
            <div class="h-[48px] flex items-center px-5 bg-[var(--bg2)] backdrop-blur-2xl border border-[var(--brd)] rounded-full shadow-[0_8px_32px_rgba(0,0,0,0.1)] shrink-0 min-w-[400px]">
                <div class="flex items-center gap-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="shrink-0">
                        <path d="M12 2L2 22h20L12 2z" stroke="var(--tx3)" stroke-width="1.5"/>
                        <path d="M7.5 15C7.5 15 9 12 12 12C15 12 16.5 15 16.5 15C16.5 15 15 18 12 18C9 18 7.5 15 7.5 15Z" stroke="var(--tx3)" stroke-width="1.2"/>
                        <circle cx="12" cy="15" r="1.5" fill="var(--ac)"/>
                        <rect x="7" y="11.5" width="10" height="7" rx="5" fill="var(--bg2)"/>
                    </svg>
                    <span class="text-[15px] font-semibold tracking-tight text-[var(--tx)]">Codorum</span>
                </div>
                <div class="w-px h-4 bg-[var(--brd)] mx-4"></div>
                <span class="text-[13px] font-medium text-[var(--tx3)]">7 files</span>
                <div class="ml-auto flex gap-2 items-center pl-6">
                    <button class="flex items-center gap-2 h-[32px] px-3 bg-[var(--input-bg)] border border-[var(--brd)] rounded-full text-[var(--tx2)] text-[13px]">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <span class="text-[11px] font-medium px-1.5 py-px rounded-md bg-[var(--tx3)]/20 text-[var(--tx2)]">⌘K</span>
                    </button>
                    <button class="h-[32px] px-4 bg-transparent border border-[var(--brd)] rounded-full text-[13px] font-medium text-[var(--tx2)]">n01z</button>
                </div>
            </div>
        </div>

        <!-- Main Content Layout -->
        <div class="flex flex-1 overflow-hidden gap-4">
            
            <!-- Sidebar -->
            <div class="w-[280px] shrink-0 bg-[var(--bg2)] backdrop-blur-2xl flex flex-col border border-[var(--brd)] rounded-[24px] shadow-[0_8px_32px_rgba(0,0,0,0.08)] overflow-hidden">
                <div class="flex items-center justify-between px-6 pt-5 pb-3">
                    <span class="text-[13px] font-semibold text-[var(--tx2)] tracking-tight">Explorer</span>
                    <button class="w-[28px] h-[28px] rounded-full text-[var(--tx2)] flex items-center justify-center hover:bg-[var(--hover)] hover:text-[var(--tx)]">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5v14"/></svg>
                    </button>
                </div>
                
                <div class="px-4 pb-3">
                    <div class="flex items-center gap-2 px-3 py-2 bg-[var(--input-bg)] border border-transparent rounded-full">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-[var(--tx3)] shrink-0 ml-1"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input type="text" class="flex-1 text-[14px] bg-transparent text-[var(--tx)] border-none outline-none placeholder:text-[var(--tx3)] min-w-0" placeholder="Search">
                        <div class="flex items-center gap-1 shrink-0 mr-1">
                            <button class="text-[10px] font-semibold px-2 py-1 rounded-full bg-[var(--tx)] text-[var(--bg)]">Name</button>
                            <button class="text-[10px] font-semibold px-2 py-1 rounded-full text-[var(--tx3)]">Body</button>
                        </div>
                    </div>
                </div>
                
                <div class="flex gap-1 px-5 pb-3 items-center">
                    <button class="text-[12px] px-3 py-1.5 rounded-full font-medium bg-[var(--hover)] text-[var(--tx)]">Name</button>
                    <button class="text-[12px] px-3 py-1.5 rounded-full font-normal text-[var(--tx3)]">Modified</button>
                </div>
                
                <div class="h-px bg-[var(--brd)] mx-5 my-1"></div>
                
                <!-- File Tree Mock -->
                <div class="flex-1 overflow-y-auto pt-2 pb-4">
                    <div class="group/drawer open mb-2">
                        <button class="flex items-center gap-2 w-full px-5 py-2 bg-transparent border-none text-left">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-[var(--tx3)] rotate-90"><path d="m9 18 6-6-6-6"/></svg>
                            <span class="text-[14px] font-semibold tracking-tight text-[var(--tx)]">src</span>
                            <span class="ml-auto flex items-center gap-2">
                                <span class="inline-flex gap-[4px] font-mono text-[11px] font-medium shrink-0">
                                    <span class="text-[var(--ac3)]">+36</span>
                                    <span class="text-[var(--danger)]">−5</span>
                                </span>
                                <span class="text-[12px] font-medium text-[var(--tx3)] min-w-[20px] text-center bg-[var(--input-bg)] px-2 py-0.5 rounded-full">4</span>
                            </span>
                        </button>
                        <div class="pt-1 pb-2 px-3">
                            <button class="flex items-center gap-3 w-full px-3 py-2 rounded-xl bg-[var(--ac)] text-white shadow-sm mb-0.5">
                                <span class="w-2.5 h-2.5 rounded-full shrink-0 shadow-sm bg-white"></span>
                                <span class="text-[14px] truncate flex-1 tracking-tight font-medium">App<span class="font-normal text-white/70">.tsx</span></span>
                                <span class="inline-flex gap-[4px] font-mono text-[11px] font-medium shrink-0"><span class="text-white">+28</span><span class="text-white/80">−5</span></span>
                            </button>
                            <button class="flex items-center gap-3 w-full px-3 py-2 rounded-xl bg-transparent text-left mb-0.5 hover:bg-[var(--hover)]">
                                <span class="w-2.5 h-2.5 rounded-full shrink-0 shadow-sm" style="background: #3178c6"></span>
                                <span class="text-[14px] truncate flex-1 tracking-tight text-[var(--tx2)]">main<span class="font-normal text-[var(--tx3)]">.tsx</span></span>
                            </button>
                            <button class="flex items-center gap-3 w-full px-3 py-2 rounded-xl bg-transparent text-left mb-0.5 hover:bg-[var(--hover)]">
                                <span class="w-2.5 h-2.5 rounded-full shrink-0 shadow-sm" style="background: #42b883"></span>
                                <span class="text-[14px] truncate flex-1 tracking-tight text-[var(--tx2)]">styles<span class="font-normal text-[var(--tx3)]">.css</span></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content Pane -->
            <div class="flex-1 overflow-y-auto bg-[var(--bg2)] backdrop-blur-2xl border border-[var(--brd)] rounded-[24px] shadow-[0_8px_32px_rgba(0,0,0,0.08)] p-8 px-10">
                <div class="flex items-baseline gap-3 mb-8">
                    <span class="text-[28px] font-semibold tracking-tight text-[var(--tx)]">Files</span>
                    <span class="text-[14px] text-[var(--tx3)] font-medium">7 visible</span>
                    <div class="ml-auto">
                        <button class="w-9 h-9 flex items-center justify-center rounded-full bg-[var(--input-bg)] border border-[var(--brd)] text-[var(--tx2)] shadow-sm hover:bg-[var(--hover)] hover:text-[var(--tx)]">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                        </button>
                    </div>
                </div>

                <div class="mb-10">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="text-[13px] font-semibold tracking-wide text-[var(--tx3)] shrink-0 uppercase">src</span>
                        <span class="flex-1 h-px bg-[var(--brd)] opacity-50"></span>
                    </div>

                    <!-- Active File Card -->
                    <div class="bg-[var(--card)] rounded-[20px] border border-transparent ring-2 ring-[var(--ac)]/50 mb-4 overflow-hidden shadow-[0_4px_24px_rgba(0,0,0,0.04)]">
                        <div class="flex items-center gap-3 px-6 py-4 border-b border-[var(--brd)] bg-[var(--hover)]/30">
                            <button class="shrink-0 text-[var(--tx3)] bg-transparent border-none p-0">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="rotate-90"><path d="m9 18 6-6-6-6"/></svg>
                            </button>
                            <span class="w-3 h-3 rounded-full shrink-0 shadow-sm bg-[#3178c6]"></span>
                            <span class="text-[16px] font-semibold tracking-tight flex-1 truncate text-[var(--tx)]">App<span class="text-[var(--tx3)] font-medium">.tsx</span></span>
                            <div class="ml-auto flex items-center gap-4">
                                <span class="text-[13px] font-medium text-[var(--tx3)] shrink-0">just now</span>
                                <span class="inline-flex gap-[4px] font-mono text-[12px] font-medium shrink-0">
                                    <span class="text-[var(--ac3)]">+28</span>
                                    <span class="text-[var(--danger)]">−5</span>
                                </span>
                            </div>
                        </div>
                        <div class="px-8 py-6 pl-[52px] overflow-hidden text-[14px] font-mono text-[var(--tx2)] leading-relaxed">
                            <span style="color: #c678dd">import</span> React <span style="color: #c678dd">from</span> <span style="color: #98c379">'react'</span>;<br/>
                            <span style="color: #c678dd">import</span> { AppProvider } <span style="color: #c678dd">from</span> <span style="color: #98c379">'./AppContext'</span>;<br/>
                            <br/>
                            <span style="color: #c678dd">export default function</span> <span style="color: #61afef">App</span>() {<br/>
                            &nbsp;&nbsp;<span style="color: #c678dd">return</span> (<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;&lt;<span style="color: #e06c75">AppProvider</span>&gt;<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&lt;<span style="color: #e06c75">AppContent</span> /&gt;<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;&lt;/<span style="color: #e06c75">AppProvider</span>&gt;<br/>
                            &nbsp;&nbsp;);<br/>
                            }
                        </div>
                    </div>

                    <!-- Collapsed File Card -->
                    <div class="bg-[var(--card)] rounded-[20px] border border-[var(--brd)] mb-4 overflow-hidden shadow-[0_4px_24px_rgba(0,0,0,0.04)]">
                        <div class="flex items-center gap-3 px-6 py-4">
                            <button class="shrink-0 text-[var(--tx3)] bg-transparent border-none p-0">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                            </button>
                            <span class="w-3 h-3 rounded-full shrink-0 shadow-sm bg-[#3178c6]"></span>
                            <span class="text-[16px] font-semibold tracking-tight flex-1 truncate text-[var(--tx)]">main<span class="text-[var(--tx3)] font-medium">.tsx</span></span>
                            <div class="ml-auto flex items-center gap-4">
                                <span class="text-[13px] font-medium text-[var(--tx3)] shrink-0">2h ago</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
